name: Build and Push GHCR Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ghcr:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # TODO 3: Authenticate to GHCR using docker/login-action@v3.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # TODO 4: Add docker/metadata-action@v5 with image path:
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ghcr-demo-api
          tags: |
            type=sha
            type=raw,value=latest

      # TODO 5: Add docker/build-push-action@v6 with push true and tags from metadata step.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}