name: Quality Checks

on:
  pull_request:
    branches: [main]

jobs:
  lint-format-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # TODO: Ensure lint blocks bad code.
      - name: Lint code
        run: npm run lint

      # TODO: Ensure Prettier formatting is enforced.
      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm test
